<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f766e">
  <title>英语速提升系统</title>
  <link rel="icon" href="./favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=20260706-reading-chrome">
  <link rel="stylesheet" href="./reading-styles.css?v=20260706-reader-fill">
  <script src="https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js" defer></script>
  <script src="./app.js?v=20260706-reading-chrome" defer></script>
  <script src="./reading.js?v=20260706-reading-chrome" type="module"></script>
  <script src="./writing.js?v=20260707-writing" defer></script>
</head>
<body class="is-home">
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <header class="app-header" hidden>
    <div class="brand">
      <img src="./favicon.svg" class="brand-mark" alt="">
      <div>
        <h1 id="app-title">英语速提升系统</h1>
        <p id="app-subtitle">逻辑词群记忆</p>
      </div>
    </div>

    <div class="header-tools">
      <button id="home-button" class="tool-button" type="button">
        <i data-lucide="arrow-left"></i>
        <span>菜单</span>
      </button>
      <div id="vocab-actions" class="header-actions">
        <button id="api-settings" class="icon-button" type="button" aria-label="助记 API 设置" title="助记 API 设置">
          <i data-lucide="settings"></i>
        </button>
        <button id="open-workspace" class="tool-button" type="button">
          <i data-lucide="notebook-tabs"></i>
          <span>工作区</span>
          <strong id="note-count">0</strong>
        </button>
        <button id="export-notes" class="tool-button primary" type="button">
          <i data-lucide="download"></i>
          <span>导出笔记</span>
        </button>
      </div>
    </div>
  </header>

  <main class="app-main">
    <section id="home-view" class="app-view home-view" data-page="home">
      <div class="home-shell">
        <div class="home-brand">
          <img src="./favicon.svg" class="home-mark" alt="">
          <div>
            <p>English</p>
            <h2>选择学习内容</h2>
          </div>
        </div>

        <div class="home-menu" aria-label="学习模块">
          <button class="home-menu-button" type="button" data-page="vocabulary">
            <i data-lucide="book-open"></i>
            <span>
              <strong>背单词</strong>
              <small>进入词表、发音、助记和工作区</small>
            </span>
            <i data-lucide="chevron-right" class="home-menu-arrow"></i>
          </button>
          <button class="home-menu-button" type="button" data-page="reading">
            <i data-lucide="newspaper"></i>
            <span>
              <strong>快速阅读</strong>
              <small>阅读训练入口，内容待添加</small>
            </span>
            <i data-lucide="chevron-right" class="home-menu-arrow"></i>
          </button>
          <button class="home-menu-button" type="button" data-page="writing">
            <i data-lucide="pen-line"></i>
            <span>
              <strong>写作积累</strong>
              <small>整理 Simon 写作资料和表达素材</small>
            </span>
            <i data-lucide="chevron-right" class="home-menu-arrow"></i>
          </button>
        </div>
      </div>
    </section>

    <section id="vocabulary-view" class="app-view" data-page="vocabulary" hidden>
      <section class="controls" aria-label="词表控制">
        <label class="control-field">
          <span>章节</span>
          <select id="chapter-select"></select>
        </label>
        <label class="control-field search-field">
          <span>搜索</span>
          <input id="search-input" type="search" autocomplete="off" placeholder="word / 释义 / 例句">
        </label>
        <small class="field-hint">A类本：完全不知道的新词；B类本：知道但不熟的词</small>
        <button id="clear-workspace" class="icon-button warn" type="button" aria-label="清空工作区" title="清空工作区">
          <i data-lucide="trash-2"></i>
        </button>
      </section>

      <section class="chapter-strip" aria-live="polite">
        <div>
          <h2 id="chapter-title">加载中</h2>
          <p id="chapter-meta">正在读取词表</p>
        </div>
        <div id="api-state" class="status-pill">Supabase 代理未配置</div>
      </section>

      <section id="word-list" class="word-list" aria-live="polite"></section>
    </section>

    <section id="reading-view" class="app-view" data-page="reading" hidden>
      <div id="reading-app"></div>
    </section>

    <section id="writing-view" class="app-view" data-page="writing" hidden>
      <div id="writing-app"></div>
    </section>
  </main>

  <aside id="workspace-panel" class="workspace-panel" aria-hidden="true" aria-label="本次学习工作区">
    <div class="panel-head">
      <div>
        <h2>工作区</h2>
        <p id="workspace-meta">本次访问 0 条</p>
      </div>
      <button id="close-workspace" class="icon-button" type="button" aria-label="关闭工作区" title="关闭工作区">
        <i data-lucide="x"></i>
      </button>
    </div>
    <ol id="workspace-list" class="workspace-list"></ol>
  </aside>

  <div id="panel-backdrop" class="panel-backdrop" hidden></div>

  <button id="scroll-top" class="scroll-top-button" type="button" aria-label="返回顶部" title="返回顶部" aria-hidden="true" tabindex="-1">
    <i data-lucide="arrow-up"></i>
  </button>

  <dialog id="api-dialog" class="api-dialog">
    <form id="api-form" class="api-form">
      <div class="dialog-head">
        <h2>助记 API</h2>
        <button class="icon-button" type="button" id="close-api-dialog" aria-label="关闭设置" title="关闭设置">
          <i data-lucide="x"></i>
        </button>
      </div>

      <label class="dialog-field">
        <span>Supabase Function URL</span>
        <input id="api-endpoint" type="url" inputmode="url" autocomplete="off" placeholder="https://<project-ref>.supabase.co/functions/v1/mnemonic-proxy">
      </label>
      <label class="dialog-field">
        <span>模型</span>
        <input id="api-model" type="text" autocomplete="off">
      </label>
      <label class="dialog-field">
        <span>Supabase anon key</span>
        <input id="api-key" type="password" autocomplete="off" placeholder="eyJ...">
      </label>

      <p class="dialog-note">这里填写的是 Supabase 项目的 anon key，可以公开放在浏览器里。真实大模型密钥放到 Supabase Edge Function 的 Secrets 中。</p>

      <div class="dialog-actions">
        <button class="tool-button" type="button" id="clear-api">
          <i data-lucide="eraser"></i>
          <span>清除</span>
        </button>
        <button class="tool-button primary" type="submit">
          <i data-lucide="check"></i>
          <span>保存</span>
        </button>
      </div>
    </form>
  </dialog>
</body>
</html>
